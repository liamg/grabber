name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build CLI binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          PKG="github.com/liamg/grabber/internal/version"
          LDFLAGS="-s -w -X ${PKG}.Version=${VERSION} -X ${PKG}.Commit=${COMMIT} -X ${PKG}.Date=${DATE}"
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              ext=""
              [ "${os}" = "windows" ] && ext=".exe"
              out="dist/grabber_${VERSION}_${os}_${arch}${ext}"
              echo "Building ${out}"
              GOOS="${os}" GOARCH="${arch}" CGO_ENABLED=0 \
                go build -trimpath -ldflags "${LDFLAGS}" -o "${out}" ./cmd/grabber
            done
          done

      - name: Generate checksums
        run: cd dist && sha256sum * > checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes dist/*
